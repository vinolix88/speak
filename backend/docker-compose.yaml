version: '3.8'

services:
  # PostgreSQL база данных
  db:
    image: postgres:15-alpine
    container_name: speak_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-speak_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-speak_pass}
      POSTGRES_DB: ${DB_NAME:-speak_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-speak_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - speak_network

  # Redis для кэширования и сессий (если нужно)
  redis:
    image: redis:7-alpine
    container_name: speak_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - speak_network

  # FastAPI приложение
  web:
    build:
      context: .
      dockerfile: Dockerfile.dockerfile
      args:
        BUILD_ENV: ${BUILD_ENV:-production}
        USER_ID: ${USER_ID:-1000}
        GROUP_ID: ${GROUP_ID:-1000}
    container_name: speak_web
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      # Для разработки: монтируем код для hot-reload
      - ./app:/app/app
    ports:
      - "8001:8000"
    environment:
      # Database
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-speak_user}:${DB_PASSWORD:-speak_pass}@db:5432/${DB_NAME:-speak_db}
      # Redis
      REDIS_URL: redis://redis:6379/0
      # Security
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.prod
    networks:
      - speak_network
    command: >
      sh -c "
      alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

  # Опционально: pgAdmin для управления БД
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: speak_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db
    networks:
      - speak_network
    profiles:
      - tools

  # Опционально: Redis Commander для управления Redis
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: speak_redis_commander
    restart: unless-stopped
    environment:
      REDIS_HOSTS: redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - speak_network
    profiles:
      - tools

networks:
  speak_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  pgadmin_data: